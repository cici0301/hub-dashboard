<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>项目汇总看板</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f0f2f5; color:#1a1a2e; }
.header { background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); color:#fff; padding:18px 28px; text-align:center; }
.header h1 { font-size:22px; }
.container { max-width:1100px; margin:0 auto; padding:16px; }
.kpi-row { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:16px; }
.kpi-card { background:#fff; border-radius:8px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.05); border-left:3px solid #ccc; text-align:center; }
.kpi-card.c1 { border-left-color:#4e79a7; } .c1 .v { color:#4e79a7; }
.kpi-card.c2 { border-left-color:#59a14f; } .c2 .v { color:#59a14f; }
.kpi-card.c3 { border-left-color:#f28e2b; } .c3 .v { color:#f28e2b; }
.kpi-card.c4 { border-left-color:#e15759; } .c4 .v { color:#e15759; }
.kpi-card.c5 { border-left-color:#76b7b2; } .c5 .v { color:#76b7b2; }
.kpi-card .l { font-size:11px; color:#888; margin-bottom:4px; }
.kpi-card .v { font-size:24px; font-weight:700; }
.row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:16px; }
.card { background:#fff; border-radius:8px; padding:16px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
.card h3 { font-size:13px; margin-bottom:10px; color:#333; }
.chart-wrap { position:relative; min-height:200px; display:flex; align-items:center; justify-content:center; }
.eff-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px; }
.eff-card { text-align:center; padding:14px 10px; background:#fff; border-radius:6px; border-left:3px solid #ccc; }
.eff-card .name { font-size:12px; font-weight:600; }
.eff-card .label { font-size:10px; color:#999; margin-top:8px; }
.eff-card .val { font-size:20px; font-weight:700; color:#1a1a2e; }
.eff-card .val2 { font-size:16px; font-weight:700; }
.eff-card .note { font-size:9px; color:#aaa; margin-top:2px; }

/* CSS-only donut chart */
.donut { width:180px; height:180px; border-radius:50%; position:relative; margin:0 auto; }
.donut-center { position:absolute; top:28%; left:28%; width:44%; height:44%; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.donut-center .big { font-size:18px; font-weight:700; }
.donut-center .small { font-size:9px; color:#999; }
.legend { display:flex; justify-content:center; gap:16px; margin-top:12px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:4px; font-size:11px; }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* CSS horizontal bars */
.bars { margin-top:12px; }
.bar-row { margin-bottom:10px; }
.bar-label { display:flex; justify-content:space-between; font-size:11px; margin-bottom:3px; }
.bar-label .name { font-weight:600; }
.bar-track { height:24px; background:#f0f0f0; border-radius:12px; overflow:hidden; }
.bar-fill { height:100%; border-radius:12px; transition:width .5s; }
.bar-fill.sub { background:#4e79a7; }
.bar-fill.conf { background:#59a14f; }

.projects { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
.pcard { background:#fff; border-radius:8px; padding:16px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.05); cursor:pointer; transition:all .2s; text-decoration:none; color:inherit; display:block; }
.pcard:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.1); }
.pcard.p1 { border-top:3px solid #4e79a7; } .pcard.p2 { border-top:3px solid #59a14f; } .pcard.p3 { border-top:3px solid #b07aa1; }
.pcard h3 { font-size:15px; margin-bottom:8px; }
.pcard .num { font-size:18px; font-weight:700; color:#1a1a2e; }
.pcard .meta { font-size:11px; color:#999; margin-top:4px; }
.ft { text-align:center; color:#bbb; font-size:10px; margin-top:12px; }
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}.projects{grid-template-columns:1fr}.eff-row{grid-template-columns:1fr}}
</style></head><body>
<div class="header"><h1>📊 项目汇总看板</h1></div>
<div class="container">
<div class="kpi-row">
<div class="kpi-card c1"><div class="l">累计提报</div><div class="v" id="k0">-</div></div>
<div class="kpi-card c2"><div class="l">累计确认</div><div class="v" id="k1">-</div></div>
<div class="kpi-card c3"><div class="l">累计对客</div><div class="v" id="k2">-</div></div>
<div class="kpi-card c4"><div class="l">累计利润</div><div class="v" id="k3">-</div></div>
<div class="kpi-card c5"><div class="l">累计利润率</div><div class="v" id="k4">-</div></div>
</div>
<div class="row">
<div class="card">
<h3>📊 各项目对比</h3>
<div class="bars" id="bars"></div>
</div>
<div class="card">
<h3>🍰 利润构成</h3>
<div class="chart-wrap">
<div class="donut" id="donut"></div>
</div>
<div class="legend" id="legend"></div>
</div>
</div>
<div class="row">
<div class="card">
<h3>📊 项目效率对比</h3>
<div class="eff-row" id="eff"></div>
</div>
<div class="card">
<h3>💰 对客 vs 利润</h3>
<div class="bars" id="bars2"></div>
</div>
</div>
<div class="projects" id="projects"></div>
<div class="ft">更新时间: <span id="ut"></span></div></div>
<script>
var D = {"total": {"submitted": 457, "confirmed": 57, "client": 87650, "profit": 25925, "profitRate": 30}, "projects": [{"name": "PolyBuzz", "submitted": 285, "confirmed": 47, "client": 66550, "profit": 20330, "url": "https://cici0301.github.io/polybuzz-dashboard/", "avgClient": 1416, "avgProfit": 433, "pct": 78}, {"name": "Gauth \u5317\u7f8e", "submitted": 77, "confirmed": 7, "client": 15100, "profit": 3939, "url": "https://cici0301.github.io/gauth-dashboard/", "avgClient": 2157, "avgProfit": 563, "pct": 15}, {"name": "Xteink \u7f8e\u56fd", "submitted": 95, "confirmed": 3, "client": 6000, "profit": 1656, "url": "https://cici0301.github.io/xteink-dashboard/", "avgClient": 2000, "avgProfit": 552, "pct": 6}], "monthly": [{"month": "2026-05", "poly": 2500, "gauth": 0, "xteink": 0}, {"month": "2026-06", "poly": 164969, "gauth": 67, "xteink": 52}, {"month": "2026-07", "poly": 26100, "gauth": 11, "xteink": 44}]};

// KPIs
document.getElementById("k0").textContent = D.total.submitted;
document.getElementById("k1").textContent = D.total.confirmed;
document.getElementById("k2").textContent = "$" + D.total.client.toLocaleString();
document.getElementById("k3").textContent = "$" + D.total.profit.toLocaleString();
document.getElementById("k4").textContent = D.total.profitRate + "%";

// Project cards
var pc = "";
D.projects.forEach(function(p, i) {
  pc += "<a class="pcard p" + (i+1) + "" href="" + p.url + "" target="_blank">";
  pc += "<h3>" + p.name + "</h3>";
  pc += "<div class="num">" + p.confirmed + " 确认 / " + p.submitted + " 提报</div>";
  pc += "<div class="meta">对客 $" + p.client.toLocaleString() + " | 利润 $" + p.profit.toLocaleString() + "</div>";
  pc += "<div class="meta" style="margin-top:4px;color:#4e79a7">点击进入 &rarr;</div></a>";
});
document.getElementById("projects").innerHTML = pc;
document.getElementById("ut").textContent = new Date().toLocaleString("zh-CN");

// CSS bar charts
var maxSub = Math.max.apply(null, D.projects.map(function(p) { return p.submitted; }));
var bh = "";
D.projects.forEach(function(p, i) {
  var sp = Math.round(p.submitted / maxSub * 100);
  var cp = Math.round(p.confirmed / maxSub * 100);
  bh += "<div class="bar-row"><div class="bar-label"><span class="name">" + p.name + "</span><span>" + p.confirmed + "/" + p.submitted + "</span></div>";
  bh += "<div class="bar-track"><div class="bar-fill sub" style="width:" + sp + "%"></div></div>";
  bh += "<div class="bar-track" style="margin-top:2px;height:16px"><div class="bar-fill conf" style="width:" + cp + "%"></div></div></div>";
});
document.getElementById("bars").innerHTML = bh;

// Client vs profit bars
var maxC = Math.max.apply(null, D.projects.map(function(p) { return p.client; }));
var bh2 = "";
D.projects.forEach(function(p) {
  var cpp = Math.round(p.client / maxC * 100);
  var pfp = Math.round(p.profit / maxC * 100);
  bh2 += "<div class="bar-row"><div class="bar-label"><span class="name">" + p.name + "</span><span>$" + p.client.toLocaleString() + " / $" + p.profit.toLocaleString() + "</span></div>";
  bh2 += "<div class="bar-track"><div class="bar-fill" style="width:" + cpp + "%;background:#f28e2b"></div></div>";
  bh2 += "<div class="bar-track" style="margin-top:2px;height:16px"><div class="bar-fill" style="width:" + pfp + "%;background:#59a14f"></div></div></div>";
});
document.getElementById("bars2").innerHTML = bh2;

// Efficiency cards
var colors = ["#4e79a7", "#59a14f", "#b07aa1"];
var eh = "";
D.projects.forEach(function(p, i) {
  eh += "<div class="eff-card" style="border-left-color:" + colors[i] + "">";
  eh += "<div class="name" style="color:" + colors[i] + "">" + p.name + "</div>";
  eh += "<div class="label">平均单笔对客</div><div class="val">$" + (p.avgClient || 0).toLocaleString() + "</div>";
  eh += "<div class="label">平均单笔利润</div><div class="val2" style="color:" + colors[i] + "">$" + (p.avgProfit || 0).toLocaleString() + "</div>";
  eh += "<div class="note">" + p.confirmed + " 笔确认</div></div>";
});
document.getElementById("eff").innerHTML = eh;

// CSS donut chart
var totalProfit = D.total.profit;
var r = 90, cx = 90, cy = 90;
var donutColors = ["#4e79a7", "#59a14f", "#b07aa1"];
var conicParts = [];
var startDeg = -90;
D.projects.forEach(function(p, i) {
  var deg = Math.round(p.profit / totalProfit * 360);
  conicParts.push(donutColors[i] + " " + startDeg + "deg " + (startDeg + deg) + "deg");
  startDeg += deg;
});
var donutStyle = "background:conic-gradient(" + conicParts.join(",") + ")";
document.getElementById("donut").style.cssText = donutStyle;
document.getElementById("donut").innerHTML = "<div class="donut-center"><div class="big">$" + totalProfit.toLocaleString() + "</div><div class="small">总利润</div></div>";

// Legend
var lg = "";
D.projects.forEach(function(p, i) {
  var pct = Math.round(p.profit / totalProfit * 100);
  lg += "<div class="legend-item"><div class="legend-dot" style="background:" + colors[i] + ""></div>" + p.name + " $" + p.profit.toLocaleString() + " (" + pct + "%)</div>";
});
document.getElementById("legend").innerHTML = lg;
</script></body></html>
